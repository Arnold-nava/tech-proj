<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI GEAR | SIGN-UP</title>
    <link rel="shortcut icon" href="../../asset/favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/auth.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
<body>
    

    <div class="signup-container">
       
        <form id="signup" onsubmit="signup(event)">
            <h1>Sign up</h1>
            <div class="sign">
                <input type="text" id="name" required>
                <label for="username">Full Name</label>
            </div>

            <div class="sign">
                <input type="email" id="email" class="sign-mail" required>
                <label for="email">Email Address</label>
            </div>

            <div class="sign">
                <input type="text" id="username" class="sign-user" required>
                <label for="username">username</label>
            </div>

            <div class="sign">
                <input type="password" id="password" class="sign-pass" required>
                <label for="password">password</label>
                <i id="toggle" class="fa-solid fa-eye" title="show password"></i> 
            </div>
            
            <span class="have">
                <a href="login.html">have account?</a>
            </span>
            
            <button type="submit" id="submit">Sign up</button>


            <span class="choice">or sign in with</span>
            <div class="icons">
                <a href="#"><i class="fa-brands fa-google"></i></a>
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
            </div>
        </form>
    </div>

    

    <script src="../../js/auth.js"></script>
</body>
</html>
