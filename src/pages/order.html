                <a href="../pages/products/desktops/nebula.html">Desktops</a>

        </div>

            <a href="../../index.html">Home</a>

                </div>

    <div class="search-modal" id="search-modal"> 
        <form class="search-box" action="">
                <input type="text" placeholder="Search products..."> 
            <button type="submit" id="close-search"> 
                <i class="fa-solid fa-xmark"></i> 
            </button> 
        </form>
    </div>

    <section class="payment-form">
        <div class="payment-container">
            <h1>Secure Payment</h1>
            <form action="" class="payment-gate">
                
                <div class="input-group">
                    <div class="input-header">
                        <h3>Your Name</h3>
                    </div>
                    <div class="input-field">
                        <div class="field-box">
                            <input type="text" id="first-name">
                            <label for="first-name">First Name</label>
                        </div>
                        <div class="field-box">
                            <input type="text" id="last-name">
                            <label for="last-name">Last Name</label>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-header">
                        <h3>Your Email</h3>
                    </div>
                    <div class="input-field">
                        <div class="field-box full">
                            <input type="email" id="email">
                            <label for="email">john.doe@example.com</label>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-header">
                        <h3>Shipping Address</h3>
                    </div>
                    <div class="input-field">
                        <div class="field-box full">
                            <input type="text" id="address1">
                            <label for="address1">Street Address</label>

                            <input type="text" id="address2">
                            <label for="address2">Street Address Line 2</label>
                                     
                            <div class="input-row">
                                <div class="field-box">
                                    <input type="text" id="city">
                                    <label for="city">City</label>
                                </div>
                                <div class="field-box">
                                    <input type="text" id="state">
                                    <label for="state">State/Province</label>
                                </div>
                            </div>
                            <div class="field-box">
                                <input type="text" id="postal-code">
                                <label for="postal-code">Postal Code</label>
                            </div>
                        </div>
                        
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-header">
                        <h3>Payment Method</h3>
                    </div>
                    <div class="input-field">
                        <div class="method-select">
                            <input type="radio" name="payment" id="credit-card" class="credit">
                            <label for="credit-card"><i class="fa-solid fa-credit-card"></i>Credit or Debit Card</label>
                            <div class="card-info">
                                <div class="field-box">
                                    <input type="text" id="card-number" required placeholder="000 000 000 00">
                                    <label for="card-number">Card Number</label>
                                </div>
                                <div class="input-row">
                                    <div class="field-box">
                                        <input type="text" id="expiry-date" required>
                                        <label for="expiry-date">Expiry Date (MM/YY)</label>
                                    </div>
                                    <div class="field-box">
                                        <input type="text" id="cvv" required>
                                        <label for="cvv">CVV</label>
                                    </div>
                                </div>
                                <div class="field-box">
                                    <input type="text" id="cardholder-name" required>
                                    <label for="cardholder-name">Cardholder Name</label>
                                </div>
                            </div>

                            <div class="method-select">
                                <input type="radio" name="payment" id="paypal">
                                <label for="paypal"><i class="fa-brands fa-paypal"></i>PayPal</label>
                            </div>
                            
                            <div class="method-select">
                                <input type="radio" name="payment" id="cod">
                                <label for="cod"><i class="fa-solid fa-hand-holding-dollar"></i>Cash on Delivery</label>
                            </div>

                        </div>
                    </div>
                </div>

                <button type="submit" class="place-order-btn">Place Order</button>
            </form>
        </div>
    </section>

    <footer class="footer-section">
        <div class="footer-row first-row">
            <div class="subscribe">
                <form action="">
                    <label for="email">GET THE LATEST DEALS AND MORE</label>
                    <div class="input-group">
                        <input type="email" id="email" placeholder="Enter email address">
                        <button type="reset">SIGN UP</button>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="footer-row second-row">
            <nav class="footer-nav">
                <a href="../../index.html">Home</a>
                <a href="about.html">About us</a>
                <a href="contact.html">Contact us</a>
                <a href="product.html">Products</a>
            </nav>
            
            <div class="social">
                <a href="https://www.facebook.com/"><i class="fa-brands fa-facebook"></i></a>
                <a href="https://www.youtube.com/"><i class="fa-brands fa-youtube"></i></a>
                <a href="https://www.instagram.com/"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
        
        <div class="line-breaker"></div>
        
        <div class="footer-row third-row">
            <span class="country"><i class="fa-solid fa-globe"></i>Philippines</span>
            
            
            <div class="eula">
                <a href="policy.html">PRIVACY POLICY</a>

                <span class="copy-right">© 2026 OMNI GEAR INC. ALL RIGHTS RESERVED.</span>
            </div>
        </div>
        
        <div class="logo-row">
            <img src="../asset/icon.svg" alt="Omni Gear">
        </div>
        
    </footer>
    
    <script src="../js/search.js"></script>
    <script src="../js/loader.js"></script>
</body>
</html>
