<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OMNI GEAR | PAYMENT </title>

<link rel="shortcut icon" href="../asset/favicon.png">

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/success.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Fredoka:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">

</head>

<body>
    <section class="loader">
        <div class="loader-video">
            <video class="video" src="../../src/asset/mp4/loader.mp4" autoplay playsinline muted></video>
        </div>
    </section>


    <section class="success-page">
        <div class="success-container">
            <div class="success-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>

            <h1>MISSION ACCOMPLISHED</h1>
            <p class="status-text">Your OMNI-GEAR arsenal is being prepped for deployment.</p>

            <span class="line"></span>

            <div class="order-details">
                <table class="receipt-table">
                    <tbody>
                        <tr>
                            <td class="head">Order ID</td>
                            <td class="separator">:</td>
                            <td class="value">#OG-99284-X</td>
                        </tr>
                        <tr>
                            <td class="head">Estimated Arrival</td>
                            <td class="separator">:</td>
                            <td class="value">April 10, 2026</td>
                        </tr>
                        <tr>
                            <td class="head">Deployment Address</td>
                            <td class="separator">:</td>
                            <td class="value">Sa bahay ni Goku</td>
                        </tr>
                        <tr>
                            <td class="head">TOTAL DEPLOYED</td>
                            <td class="separator">:</td>
                            <td class="value">₱30,999.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="success-action">
                <a href="../../index.html" class="btn-secondary">RETURN TO BASE</a>
            </div>
        </div>
    </section>
    
    <script src="../js/loader.js"></script>
</body>
</html>
