<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADJ Tehcs login/signup</title>
    <link rel="stylesheet" href="/src/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    

    <div class="login-container">
       
        <form id="login" onsubmit="login(event)">
            <h1>Login</h1>
            <div class="login user">
                <label for="username">username</label>
                <input type="text" id="username" placeholder="Enter username or email">
                <i class="fa-regular fa-user"></i>
            </div>

            <div class="login pass">
                <label for="password">password</label>
                <input type="password" id="password" placeholder="Password">
                <i id="toggle" class="fa-solid fa-eye" title="show password"></i>
            </div>

            <button type="submit" id="submit"> Login</button>

            <h3>or login using</h3>
            <div class="icons">
                <a href="#"><i class="fa-brands fa-google"></i></a>
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
            </div>
        </form>
    </div>
    
</body>
</html>
